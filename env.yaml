name: emdag

channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch 
  - pytorch=1.12.1
  - torchvision=0.13.1
  - cudatoolkit=11.3.1

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - joblib
  - scikit-learn
  - tqdm
  - requests
  - pyyaml
  - easydict
  - lmdb

  # Visualization & logging
  - tensorboard
  - matplotlib
  - seaborn

  # Biology / structural tools
  - biopython>=1.81,<1.83
  - mmseqs2
  - pdbfixer
  - anarci
  - abnumber

